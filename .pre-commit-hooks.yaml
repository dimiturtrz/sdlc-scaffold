# Remote-delivery hooks source: the manifest a consumer references via repo:<url> + rev once this
# scaffold is git-versioned. UNUSED in the no-git MVP — generated repos use a repo: local config instead.
- id: ruff-gate
  name: ruff — enforced (full select)
  entry: uvx ruff@0.15.13 check
  language: system
  pass_filenames: false
  always_run: true

- id: vulture-gate
  name: vulture — dead code (conf>=80)
  entry: uvx vulture@2.16 --min-confidence 80
  language: system
  pass_filenames: false
  always_run: true

- id: arch-fitness
  name: architecture fitness (graph.py --assert)
  entry: uv run python -m devtools.graph --assert
  language: system
  pass_filenames: false
  always_run: true

# House rule: everything meaningful is an object — a top-level function should be a method of the class
# that owns its state/responsibility (a named, injectable seam), not a free function. `main`/`_main`
# (the CLI entrypoint) is exempt. Severity `error`: clean on a fresh project, so it RATCHETS — CI fails
# on any NEW top-level function.
id: py-top-level-function
language: python
severity: error
message: "top-level function — make it a method on the class that owns it (house rule; `main` exempt)"
rule:
  kind: function_definition
  inside:
    kind: module
    stopBy: neighbor
  not:
    has:
      field: name
      regex: "^_?main$"

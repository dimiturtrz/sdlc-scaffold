# House rule: everything meaningful is an object — a top-level function should be a method of the class
# that owns its state/responsibility (a named, injectable seam), not a free function. `main`/`_main`
# (the CLI entrypoint) is exempt. Severity `error`: clean on a fresh project, so it RATCHETS — CI fails
# on any NEW top-level function.
# Two branches: a bare `function_definition`, AND a `decorated_definition` wrapping one — so a decorated
# free function (`@contextmanager`, `@cache`, a framework's `@torch.no_grad()`) can't slip past the gate.
# Class methods don't match: their definition sits inside the class `block`, not directly inside `module`.
id: py-top-level-function
language: python
severity: error
message: "top-level function — make it a method on the class that owns it (house rule; `main` exempt)"
rule:
  any:
    - kind: function_definition
      inside:
        kind: module
        stopBy: neighbor
      not:
        has:
          field: name
          regex: "^_?main$"
    - kind: decorated_definition
      inside:
        kind: module
        stopBy: neighbor
      has:
        kind: function_definition
        not:
          has:
            field: name
            regex: "^_?main$"

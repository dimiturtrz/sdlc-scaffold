# The SCAFFOLD's own CI (not the template's — that lives in template/.github/). Runs the whole suite:
# tests/unit (devtools fitness-function LOGIC) + tests/e2e (generate real projects, run every gate,
# prove the gates bite, prove copier update heals drift). node is installed for the jscpd steps.
name: tests
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history AND tags — test_a_template_change_must_carry_a_version_bump
                           # anchors on the last v* release tag, which a shallow checkout would not fetch
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit (devtools logic) + E2E (generate + gate every toggle combo)
        run: uv run --group dev pytest tests -v

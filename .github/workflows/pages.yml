name: architecture

# Self-scaffolding: publish the scaffold's OWN architecture to GitHub Pages under /architecture/. archmap
# maps the guardrail engines (sdlc-devtools/devtools) -> graph.json (committed diff-truth) + a self-contained
# interactive viewer, regenerated here and deployed. Served at a /architecture/ SUBPATH (not the site root)
# so the single Pages site stays free for other pages. Enable once: Settings -> Pages -> Source = "GitHub
# Actions". (One repo = one Pages site; a repo already deploying Pages must fold this build into that one
# workflow rather than add a second deployer — the github-pages environment allows only one.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdlc-devtools
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Regenerate the site from the current engine graph (committed graph.json is the diff-truth; the
      # ~700KB viewer shell is built fresh here rather than committed).
      - name: Build the architecture site (graph.json + interactive viewer)
        run: uv run --group dev python -m devtools.archmap devtools
      # Stage under an architecture/ subfolder so the site publishes at /architecture/, not the root.
      - name: Stage the /architecture/ subpath
        run: |
          mkdir -p _site/architecture
          cp docs/architecture/graph.json docs/architecture/index.html _site/architecture/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: sdlc-devtools/_site
      - id: deployment
        uses: actions/deploy-pages@v4

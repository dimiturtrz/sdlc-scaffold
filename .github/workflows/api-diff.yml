# The SCAFFOLD's own release gate (not the template's). On a version tag, diff the sdlc-devtools PUBLIC
# API against the previous tag with griffe — consumers pin the package by tag, so a removed/changed public
# object is a breaking change they inherit on a `devtools_ref` bump. Advisory: an INTENDED break (a major/
# minor bump) shouldn't fail the release, but the annotation forces the releaser to acknowledge it and set
# the version accordingly. griffe runs from the repo root with `-s sdlc-devtools` because the package is a
# subdirectory (on extraction — see docs/SPLIT.md — it becomes `-s .` in the package's own repo). bd 85l.6.
name: api-diff
on:
  push:
    tags: ["v*"]
  # ALSO on every PR that touches the package, comparing the branch against the newest tag. On a tag this
  # check necessarily speaks AFTER the tag exists, so a break it finds there belongs to a release already
  # cut — its own promise to "force the releaser to set the version accordingly" was unachievable, because
  # the version was chosen two steps earlier. On a PR the annotation lands while the major/minor decision
  # is still open, which is the only moment it can inform anything. Advisory either way: an intended break
  # must not block a merge. The value here is timing, not blocking.
  pull_request:
    paths: ["sdlc-devtools/**"]
  # Dispatchable so `release.yml` can invoke it on the tag it just published: a tag pushed with
  # GITHUB_TOKEN does not fire `push: tags`, so without this the gate would quietly stop running as soon
  # as tagging became automatic. Also lets a tag be re-checked by hand.
  workflow_dispatch:

jobs:
  api-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full tag history so the previous tag is resolvable
      - uses: astral-sh/setup-uv@v5
      - name: Breaking-API check vs previous tag (sdlc-devtools)
        continue-on-error: true
        run: |
          # On a tag push the current tag is itself in the list and must be excluded. On a PR the checked-out
          # tree carries no tag, so nothing is excluded and the newest tag becomes the baseline — which is
          # exactly the question a PR wants answered: does this branch break what the last release published?
          PREV=$(git tag --sort=-v:refname | grep -vFx "${GITHUB_REF_NAME}" | head -1)
          echo "comparing devtools public API: ${GITHUB_REF_NAME} vs ${PREV:-<none>}"
          [ -z "$PREV" ] && { echo "no previous tag — nothing to diff"; exit 0; }
          uv run --with griffe griffe check devtools -s sdlc-devtools -a "$PREV"

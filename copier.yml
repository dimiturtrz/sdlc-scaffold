# copier questionary + settings. Only `template/` is rendered.
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

# Scaffold-meta excluded from generated output. The template ships ZERO package code (bd r2w) — only
# guardrails — so there are no demo-package excludes here.
_exclude:
  - ".git"
  - ".venv"
  - "__pycache__"
  - "*.pyc"
  # The engines are an installed package now, so there is no per-domain engine exclusion: shape_contracts
  # ships in sdlc-devtools regardless, and a `domain: none` project simply never WIRES the shape gate
  # (no shape step in its ci/nox/pre-commit) — the engine is inert if unused.

project_name:
  type: str
  help: "Repo / folder name, kebab-case (e.g. sample-proj)"
  placeholder: "my-project"

packages:
  type: str
  help: "Packages the guardrails target — comma-separated, snake_case (add your others, e.g. core,neuroscan,neuroviz)"
  default: "{{ project_name.replace('-', '_') }}"

# The repo's own git root (this project's remote), the ONE place a generated project records where it lives.
# Used for the README clone line + to DERIVE the architecture Pages link (below). Blank = skip both. Note:
# this is the CONSUMER repo — distinct from the scaffold URL baked into the devtools git-dep pin.
repo_url:
  type: str
  help: "Git remote of THIS repo (e.g. https://github.com/you/repo) — README clone line + architecture link; blank to skip"
  default: ""

# Derived, never asked: OWNER/REPO parsed from repo_url (https OR scp/ssh remote), else "". The one slug the
# README badges (CI, license) + the Pages link build on.
repo_slug:
  type: str
  when: false
  default: >-
    {%- if repo_url and 'github.com' in repo_url -%}
    {{ repo_url.split('github.com')[1] | replace('.git', '') | trim('/:') }}
    {%- endif -%}

# Derived, never asked: the GitHub Pages base — https://OWNER.github.io/REPO. Empty unless repo_slug parsed.
# README appends /architecture/ (only when archviz_pages ships the site).
pages_url:
  type: str
  when: false
  default: >-
    {%- if repo_slug -%}
    https://{{ repo_slug.split('/')[0] }}.github.io/{{ repo_slug.split('/')[1] }}
    {%- endif -%}

# The quality gates + beads are the non-optional house bar — always shipped, no prompt, no toggle: their
# blocks render unconditionally in the templates (bd 9nq unwrapped the last inert `{% if %}` guards).
# import-linter is the one gate that self-gates: it needs >1 package to have anything to forbid.
use_import_linter:
  type: bool
  default: "{{ (packages.split(',') | length) > 1 }}"
  when: false

# Hygiene-gate scan scope (bd 9mu). ruff + jscpd are R1 HYGIENE gates — they may run WIDER than the R2/R3
# arch set (`packages`, used by graph.py / ast-grep): a repo with a viewer or a tests tree worth linting
# keeps them covered here rather than LOSING that coverage to adopt (owner no-dodge / superset rule).
# ASKED (when:true) so a non-default value PERSISTS in .copier-answers.yml and survives `copier update`
# (bd fsl — a `when:false` computed var is neither stored nor honored on the update path, so a widened
# scope was silently lost). Default = `packages` (space-joined); accept it with Enter, or widen (e.g.
# "core trainer viewer tests" / a web-TS dir). `--data lint_paths=...` overrides non-interactively.
lint_paths:
  type: str
  help: "Scope for the R1 hygiene lints (ruff enforced) — space-separated; default = packages, widen for a viewer/tests tree"
  default: "{{ packages.split(',') | map('trim') | join(' ') }}"

jscpd_paths:
  type: str
  help: "Scope for the jscpd DRY gate — space-separated; default = packages, widen e.g. to a web-TS source dir"
  default: "{{ packages.split(',') | map('trim') | join(' ') }}"

domain:
  type: str
  help: "Project domain — `ml` adds the numpy dep + ML-workflow gitignore (data-outside-repo/paths.yaml, MLflow, training runs) + the data-skip CI env; `none` = a domain-neutral Python scaffold."
  choices:
    - ml
    - none
  default: ml

# `enable_ml` kept as a computed `when:false` var so the templates' `{% if enable_ml %}` blocks are unchanged.
enable_ml:
  type: bool
  default: "{{ domain == 'ml' }}"
  when: false

# Data-skip env var NAME (bd skr GAP3a). domain=ml tests read their data root from an env var so a runner
# with no dataset points it at an empty dir and data-gated tests SKIP (not error). The var NAME is a per-repo
# FACT — a repo whose code reads CARDIAC_DATA can't adopt a CI that sets CARDIOSEG_DATA (tests would ERROR,
# not skip, with no LOCAL-SLOT to inject it). ASKED for ml (when=enable_ml) so the value PERSISTS + survives
# `copier update` (bd fsl); not asked for domain=none (the data-skip env block is ml-gated, so it's unused).
# MUST come after `enable_ml` — copier evaluates vars top-to-bottom, so `when` can only see vars above it.
data_env_var:
  type: str
  help: "Env var name the ml data adapters read for the dataset root (CI points it at an empty dir so data-gated tests skip)"
  default: "{{ project_name | upper | replace('-','_') }}_DATA"
  when: "{{ enable_ml }}"

coverage_floor:
  type: int
  help: "Coverage floor (coverage report --fail-under)"
  default: 80

# Copyright holder for the generated MIT LICENSE (bd c64). A scaffold that ships guardrails but no LICENSE
# leaves every generated repo legally all-rights-reserved (defeats reuse). Default = the project's own name;
# set your name/org so the copyright line is real.
author:
  type: str
  help: "Copyright holder for the generated LICENSE (your name or org)"
  default: "{{ project_name }}"

# archmap always emits docs/architecture/graph.json (committed diff-truth) + a self-contained interactive
# viewer, regardless of this flag. This ONLY gates shipping the GitHub Pages deploy workflow — opt-in
# because Pages needs enabling in repo settings and publishes a PUBLIC site (a private repo needs GitHub
# Pro for private Pages, or accepts the architecture being public). Off = no pages.yml; regen/--check still run.
archviz_pages:
  type: bool
  help: "Publish the interactive architecture viewer to GitHub Pages? (needs Pages enabled; public site — private repos need GH Pro). Only if this repo has no other Pages deployer — a staged site (/architecture/ = main, /preview/ = dev) it fully owns. If you already deploy Pages, leave this off and compose archmap as an /architecture/ subpath instead (see README)."
  default: false

# Single source of truth for the ruff select codes — rendered into pyproject.toml, ci.yml, noxfile.py
# and .pre-commit-config.yaml so the list lives in ONE place. The house bar = the UNION of all repos'
# rules (bd o70): every code ANY house repo enforces belongs here, byte-identical across repos — no
# per-repo rule slots, no dodging. Per-repo variation is FACTS only (paths / naming VOCAB / deps).
# This list = cardiac-seg's ratchet (the furthest-advanced repo, ORIGIN of the extra codes), pulled up
# whole so cardiac can adopt without losing rules and mind/synth converge UP onto it (bd vip.2). Each
# repo FIXES to it (blocking-first) — mindscape's 383 N-hits are fixed, not exempted (union overrules
# its N-rejection). Specific codes, NOT broad families. DELIBERATELY OUT (owner-rejected, on record):
# UP (pyupgrade annotation churn), E701/E702 (the dense `a; b` / `if x: y` compaction is house style),
# W (pycodestyle warnings the formatter already owns). S101 (no-assert-in-prod) is IN (owner call): a real
# bug-class — `assert` is stripped under `python -O`, so a prod invariant on a bare assert silently
# vanishes; all 3 repos honor it by convention (zero fix when clean). Tests use asserts -> S101 sits in the
# tests per-file-ignores.
# E501 + SLF001 GRADUATED advisory->enforced (owner 2026-07-16, bd 4c2/8ex reopened). Prior framing was
# wrong on both: (a) SLF001 does NOT conflict with the py-top-level-function ast-grep gate — that gate only
# forces "helpers live on a class", NOT static-vs-instance, NOT private naming, NOT class-name calls. A plain
# instance method (`self._helper`) satisfies the house rule and never trips SLF001; the "99 FP on mind" came
# from a self-imposed style (stateless statics + private + `Cls._helper`), which no rule requires. SLF001 is
# a real reach-in signal. (b) E501 is legislated already — line-length 120 is a decided absolute; the gate
# just enforces it. A genuine long line (URL, dense literal) takes a per-line `# noqa: E501`. Both ship clean
# on a fresh gen (0 hits), so they BLOCK regressions from day one, same as the rest of the union.
ruff_select:
  type: str
  default: "F,B,I,T201,FBT,BLE001,S101,S110,C901,PLR0912,PLR0913,PLR0915,PLR2004,PLC0415,RUF100,N,E741,E742,E743,PLR0124,PLR1714,PLW3301,RUF012,RUF005,RUF007,RUF010,RUF022,RUF046,C408,C420,SIM,PERF401,PLW0108,E731,E402,ICN001,S603,S607,PTH123,E501,SLF001"
  when: false

# Extra codes surfaced by the non-blocking `ruff check . --statistics` run over the WHOLE tree (`.` vs the
# enforced `lint_paths`) — reported, never a merge gate. Empty since E501/SLF001 graduated into the enforced
# union (nothing is advisory-only now); the `--extend-select` is guarded off when this is blank. Kept as a
# seam: a future code that needs whole-tree visibility before it's honest to gate rides here.
ruff_advisory_select:
  type: str
  default: ""
  when: false

# Single source of truth for the pinned tool versions — rendered into ci.yml / noxfile.py /
# .pre-commit-config.yaml (and parsed by the E2E conftest) so a version bump happens in ONE place.
# `when: false` = never asked, always this value.
ruff_version:
  type: str
  default: "0.15.13"
  when: false

vulture_version:
  type: str
  default: "2.16"
  when: false

nox_version:
  type: str
  default: "2026.7.11"
  when: false

deptry_version:
  type: str
  default: "0.25.1"
  when: false

pip_audit_version:
  type: str
  default: "2.10.1"
  when: false

precommit_version:
  type: str
  default: "4.6.0"
  when: false

pyrefly_version:
  type: str
  default: "1.1.1"
  when: false

# The devtools ANALYZERS ship as an installed package (sdlc-devtools), pinned by this scaffold TAG in the
# generated pyproject's `devtools` extra (`sdlc-devtools @ git+…@{{ devtools_ref }}#subdirectory=sdlc-devtools`).
# Bumping this = the engine-update mechanism: a new scaffold release retags, `copier update` re-renders the
# ONE pin line (no re-vendored devtools source diff in the consumer). Must track the tag the matching
# sdlc-devtools/ was published at. `when: false` (never asked, always the release value).
devtools_ref:
  type: str
  default: "v1.20.0"
  when: false

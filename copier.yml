# copier questionary + settings. Only `template/` is rendered.
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

# Scaffold-meta excluded from generated output. The template ships ZERO package code (bd r2w) — only
# guardrails — so there are no demo-package excludes here.
_exclude:
  - ".git"
  - ".venv"
  - "__pycache__"
  - "*.pyc"
  # shape_contracts is the ML-domain shape gate (jaxtyping/beartype) — meaningless off a tensor codebase,
  # so a `domain: none` scaffold ships neither the engine nor its wiring/deps.
  - "{% if not enable_ml %}devtools/shape_contracts.py{% endif %}"

project_name:
  type: str
  help: "Repo / folder name, kebab-case (e.g. sample-proj)"
  placeholder: "my-project"

packages:
  type: str
  help: "Packages the guardrails target — comma-separated, snake_case (add your others, e.g. core,neuroscan,neuroviz)"
  default: "{{ project_name.replace('-', '_') }}"

# The quality gates + beads are the non-optional house bar — always shipped, no prompt, no toggle: their
# blocks render unconditionally in the templates (bd 9nq unwrapped the last inert `{% if %}` guards).
# import-linter is the one gate that self-gates: it needs >1 package to have anything to forbid.
use_import_linter:
  type: bool
  default: "{{ (packages.split(',') | length) > 1 }}"
  when: false

# Hygiene-gate scan scope (bd 9mu). ruff + jscpd are R1 HYGIENE gates — they may run WIDER than the R2/R3
# arch set (`packages`, used by graph.py / ast-grep): a repo with a viewer or a tests tree worth linting
# keeps them covered here rather than LOSING that coverage to adopt (owner no-dodge / superset rule — the
# R1 > R2/R3 scope principle vip.3 floated but didn't wire). Default = `packages` (space-joined); a repo
# widens by setting these in its .copier-answers.yml (e.g. "core trainer viewer tests" / a web-TS dir).
lint_paths:
  type: str
  default: "{{ packages.split(',') | map('trim') | join(' ') }}"
  when: false

jscpd_paths:
  type: str
  default: "{{ packages.split(',') | map('trim') | join(' ') }}"
  when: false

domain:
  type: str
  help: "Project domain — `ml` adds the numpy dep + ML-workflow gitignore (data-outside-repo/paths.yaml, MLflow, training runs) + the data-skip CI env; `none` = a domain-neutral Python scaffold."
  choices:
    - ml
    - none
  default: ml

# `enable_ml` kept as a computed `when:false` var so the templates' `{% if enable_ml %}` blocks are unchanged.
enable_ml:
  type: bool
  default: "{{ domain == 'ml' }}"
  when: false

coverage_floor:
  type: int
  help: "Coverage floor (coverage report --fail-under)"
  default: 80

# Single source of truth for the ruff select codes — rendered into pyproject.toml, ci.yml, noxfile.py
# and .pre-commit-config.yaml so the list lives in ONE place. The house bar = the UNION of all repos'
# rules (bd o70): every code ANY house repo enforces belongs here, byte-identical across repos — no
# per-repo rule slots, no dodging. Per-repo variation is FACTS only (paths / naming VOCAB / deps).
# This list = cardiac-seg's ratchet (the furthest-advanced repo, ORIGIN of the extra codes), pulled up
# whole so cardiac can adopt without losing rules and mind/synth converge UP onto it (bd vip.2). Each
# repo FIXES to it (blocking-first) — mindscape's 383 N-hits are fixed, not exempted (union overrules
# its N-rejection). Specific codes, NOT broad families. DELIBERATELY OUT (owner-rejected, on record):
# UP (pyupgrade annotation churn), E701/E702 (the dense `a; b` / `if x: y` compaction is house style),
# W (pycodestyle warnings the formatter already owns). OPEN for owner: S101 (no-assert-in-prod) — a real
# axis all 3 repos already honor by convention; left out pending a conscious call (bd vip.2), not added
# by default. `when: false` = never asked, always this value.
ruff_select:
  type: str
  default: "F,B,E501,I,T201,FBT,BLE001,S110,C901,PLR0912,PLR0913,PLR0915,PLR2004,PLC0415,RUF100,N,E741,E742,E743,PLR0124,PLR1714,PLW3301,RUF012,RUF005,RUF007,RUF010,RUF022,RUF046,C408,C420,SIM,PERF401,PLW0108,E731,E402,ICN001,S603,S607,PTH123,SLF001"
  when: false

# Single source of truth for the pinned tool versions — rendered into ci.yml / noxfile.py /
# .pre-commit-config.yaml (and parsed by the E2E conftest) so a version bump happens in ONE place.
# `when: false` = never asked, always this value.
ruff_version:
  type: str
  default: "0.15.13"
  when: false

vulture_version:
  type: str
  default: "2.16"
  when: false

nox_version:
  type: str
  default: "2026.7.11"
  when: false

precommit_version:
  type: str
  default: "4.6.0"
  when: false

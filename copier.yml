# copier questionary + settings. Only `template/` is rendered.
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

# Exclude scaffold-meta from generated output (belongs to the template repo, not the project).
# Toggle-keyed entries render to "" (a gitignore no-op) when the feature is ON, and to the path
# when OFF — so clean filenames live in template/ and copier drops the ones a project didn't ask for.
_exclude:
  - ".git"
  - ".venv"
  - "__pycache__"
  - "*.pyc"
  - "{% if not enable_astgrep %}devtools/sg-rules{% endif %}"
  - "{% if not enable_astgrep %}devtools/sgconfig.yml{% endif %}"
  - "{% if not enable_jscpd %}devtools/jscpd.json{% endif %}"
  - "{% if not enable_class_shape_smells %}devtools/lcom.py{% endif %}"
  - "{% if not enable_class_shape_smells %}devtools/data_clumps.py{% endif %}"
  - "{% if not enable_class_shape_smells %}devtools/state_candidates.py{% endif %}"
  - "{% if not ship_example %}{{ package_name }}{% endif %}"
  - "{% if not ship_example %}tests/unit/test_math_ops.py{% endif %}"
  - "{% if not ship_example %}tests/unit/test_pipeline.py{% endif %}"

project_name:
  type: str
  help: "Repo / folder name, kebab-case (e.g. sample-proj)"
  placeholder: "my-project"

packages:
  type: str
  help: "Packages the guardrails target — comma-separated, snake_case (add your others, e.g. core,neuroscan,neuroviz)"
  default: "{{ project_name.replace('-', '_') }}"

# The demo package's folder name = the FIRST entry in `packages`. Computed, never asked — keeps
# folder names simple interpolation (`{{ '{{' }} package_name {{ '}}' }}/`) while `packages` stays the one input.
package_name:
  type: str
  default: "{{ packages.split(',')[0] | trim }}"
  when: false

ship_example:
  type: bool
  help: "Ship the demo package (math_ops + pipeline) so a fresh gen has code to lint/test/graph? Set false when adopting into a repo that already has its own code."
  default: true

enforce_arch_fitness:
  type: bool
  help: "Ship the arch-fitness gate (graph.py --assert + [tool.structure])?"
  default: true

enable_astgrep:
  type: bool
  help: "Ship the ast-grep module-shape gate (in-a-class + no import-time side effects)?"
  default: false

enable_jscpd:
  type: bool
  help: "Ship the jscpd duplication (DRY) gate?"
  default: false

enable_class_shape_smells:
  type: bool
  help: "Ship the advisory class-shape smell explorers (LCOM4 cohesion / data-clumps / namespace-state)?"
  default: false

coverage_floor:
  type: int
  help: "Coverage floor (coverage report --fail-under)"
  default: 80

# Single source of truth for the ruff select codes — rendered into pyproject.toml, ci.yml, noxfile.py
# and .pre-commit-config.yaml so the list lives in ONE place. Curated-narrow (the cardiac/synthscape
# majority): specific codes, NOT broad families; deliberately excludes UP/SIM/C4 (opinionated churn).
# `when: false` = never asked, always this value.
ruff_select:
  type: str
  default: "F,B,E501,I,T201,FBT,BLE001,S110,C901,PLR0912,PLR0913,PLR0915,PLR2004,PLC0415,RUF100"
  when: false

# Single source of truth for the pinned tool versions — rendered into ci.yml / noxfile.py /
# .pre-commit-config.yaml (and parsed by the E2E conftest) so a version bump happens in ONE place.
# `when: false` = never asked, always this value.
ruff_version:
  type: str
  default: "0.15.13"
  when: false

vulture_version:
  type: str
  default: "2.16"
  when: false

nox_version:
  type: str
  default: "2026.7.11"
  when: false

precommit_version:
  type: str
  default: "4.6.0"
  when: false

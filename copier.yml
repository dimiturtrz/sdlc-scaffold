# copier questionary + settings. Only `template/` is rendered.
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

# Scaffold-meta excluded from generated output. The template ships ZERO package code (bd r2w) — only
# guardrails — so there are no demo-package excludes here.
_exclude:
  - ".git"
  - ".venv"
  - "__pycache__"
  - "*.pyc"

project_name:
  type: str
  help: "Repo / folder name, kebab-case (e.g. sample-proj)"
  placeholder: "my-project"

packages:
  type: str
  help: "Packages the guardrails target — comma-separated, snake_case (add your others, e.g. core,neuroscan,neuroviz)"
  default: "{{ project_name.replace('-', '_') }}"

# The quality gates + beads are the non-optional house bar — always shipped, no prompt. Kept as computed
# `when:false` = always-true so the templates' `{% if X %}` blocks render unconditionally (a later cleanup
# unwraps them; bd rji). import-linter is the one that self-gates: it needs >1 package to have anything to forbid.
enforce_arch_fitness: {type: bool, default: true, when: false}
enable_astgrep: {type: bool, default: true, when: false}
enable_jscpd: {type: bool, default: true, when: false}
enable_class_shape_smells: {type: bool, default: true, when: false}
enable_beads: {type: bool, default: true, when: false}

use_import_linter:
  type: bool
  default: "{{ (packages.split(',') | length) > 1 }}"
  when: false

domain:
  type: str
  help: "Project domain — `ml` adds the numpy dep + ML-workflow gitignore (data-outside-repo/paths.yaml, MLflow, training runs) + the data-skip CI env; `none` = a domain-neutral Python scaffold."
  choices:
    - ml
    - none
  default: ml

# `enable_ml` kept as a computed `when:false` var so the templates' `{% if enable_ml %}` blocks are unchanged.
enable_ml:
  type: bool
  default: "{{ domain == 'ml' }}"
  when: false

coverage_floor:
  type: int
  help: "Coverage floor (coverage report --fail-under)"
  default: 80

# Single source of truth for the ruff select codes — rendered into pyproject.toml, ci.yml, noxfile.py
# and .pre-commit-config.yaml so the list lives in ONE place. Curated-narrow (the cardiac/synthscape
# majority): specific codes, NOT broad families; deliberately excludes UP/SIM/C4 (opinionated churn).
# `when: false` = never asked, always this value.
ruff_select:
  type: str
  default: "F,B,E501,I,T201,FBT,BLE001,S110,C901,PLR0912,PLR0913,PLR0915,PLR2004,PLC0415,RUF100"
  when: false

# Single source of truth for the pinned tool versions — rendered into ci.yml / noxfile.py /
# .pre-commit-config.yaml (and parsed by the E2E conftest) so a version bump happens in ONE place.
# `when: false` = never asked, always this value.
ruff_version:
  type: str
  default: "0.15.13"
  when: false

vulture_version:
  type: str
  default: "2.16"
  when: false

nox_version:
  type: str
  default: "2026.7.11"
  when: false

precommit_version:
  type: str
  default: "4.6.0"
  when: false
